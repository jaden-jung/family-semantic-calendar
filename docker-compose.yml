services:
  db:
    image: pgvector/pgvector:pg16
    container_name: family-calendar-db
    environment:
      POSTGRES_DB: family_calendar
      POSTGRES_USER: calendar_app
      POSTGRES_PASSWORD: calendar_app_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_app -d family_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: family-calendar-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://calendar_app:calendar_app_password@db:5432/family_calendar
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  pgdata:
