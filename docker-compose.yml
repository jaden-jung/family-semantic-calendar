services:
  db:
    image: pgvector/pgvector:pg16
    container_name: family-calendar-db
    environment:
      POSTGRES_DB: family_calendar
      POSTGRES_USER: calendar_app
      POSTGRES_PASSWORD: calendar_app_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_app -d family_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

